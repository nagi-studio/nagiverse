name: Validate Content

on:
  pull_request:
    paths:
      - 'content/**'
      - 'schemas/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Validate content schemas and references
        run: bun run validate

      - name: Dry-run content build
        run: bun run build:content

      - name: Type check
        run: bun run check
