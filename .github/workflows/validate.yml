name: Validate Content

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Validate content schemas and references
        run: bun run validate

      - name: Dry-run content build
        run: bun run build:content

      - name: Type check
        run: bun run check

  autocorrect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Detect content changes
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --quiet origin/${{ github.base_ref }}...HEAD -- content/; then
            echo "content_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "content_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.changes.outputs.content_changed == 'true'
        uses: huacnlee/autocorrect-action@v2
        with:
          args: --fix content/

      - if: steps.changes.outputs.content_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: autocorrect formatting"
          file_pattern: "content/**"
